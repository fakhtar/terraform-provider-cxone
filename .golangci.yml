# golangci-lint v2 configuration
# https://golangci-lint.run/docs/configuration/

version: "2"

run:
  timeout: 10m

linters:
  default: none
  enable:
    - copyloopvar      # detects loop variable capture bugs
    - errcheck         # checks unchecked errors
    - govet            # reports suspicious Go constructs
    - ineffassign      # detects ineffectual assignments
    - misspell         # finds common spelling mistakes
    - noctx            # finds HTTP requests without context
    - staticcheck      # go static analysis
    - unconvert        # removes unnecessary type conversions
    - unparam          # reports unused function parameters
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt